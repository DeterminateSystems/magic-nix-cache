name: Build artifacts

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-artifacts:
    runs-on: ${{ matrix.systems.runner }}
    permissions:
      contents: read
      id-token: write
    env:
      ARTIFACT_KEY: magic-nix-cache-${{ matrix.systems.system }}
      ARCHIVE_NAME: magic-nix-cache.closure.xz
    strategy:
      matrix:
        systems:
          - nix-system: x86_64-linux
            system: X64-Linux
            runner: UbuntuLatest32Cores128G
          - nix-system: aarch64-linux
            system: ARM64-Linux
            runner: UbuntuLatest32Cores128GArm
          - nix-system: aarch64-darwin
            system: ARM64-macOS
            runner: namespace-profile-mac-m2-12c28g
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix on ${{ matrix.systems.system }}
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3.20.0

      - name: Set up FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build and cache dev shell for ${{ matrix.systems.nix-system }}
        run: |
          nix build ".#devShells.${{ matrix.systems.nix-system }}.default"

      - name: Build package and create closure for ${{ matrix.systems.system }}
        run: |
          nix build .#packages.$SYSTEM.default -L --fallback && \
            nix-store --export $(nix-store -qR ./result) | xz -9 > "${{ env.ARCHIVE_NAME }}"
        env:
          SYSTEM: ${{ matrix.systems.nix-system }}

      - name: Upload magic-nix-cache closure for ${{ matrix.systems.system }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Artifact name
          name: ${{ env.ARTIFACT_KEY }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 1
